<svg xmlns="http://www.w3.org/2000/svg" width="720" height="234" viewBox="0 0 720 234" font-family="ui-monospace, 'SF Mono', 'DejaVu Sans Mono', Consolas, monospace" font-size="15">
<style>
  .type { transform: scaleX(0); transform-box: fill-box; transform-origin: left;
           animation: type var(--d) steps(var(--n)) forwards; animation-delay: var(--t); }
